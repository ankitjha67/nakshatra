version: 2
updates:
  # Python API dependencies
  - package-ecosystem: pip
    directory: /api
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels: [dependencies, security]

  # Web frontend dependencies
  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels: [dependencies, security]

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
